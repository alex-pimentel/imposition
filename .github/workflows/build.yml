name: Build

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: packages/web/dist

  build-electron:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/electron
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
