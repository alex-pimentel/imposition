name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --include=optional
      - run: npm audit --audit-level=high

  format:
    name: Format Check
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --include=optional
      - run: npm run format

  lint:
    name: Lint & TypeCheck
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --include=optional
      - run: npm run lint
      - run: npx tsc --noEmit -p packages/web/tsconfig.json

  tests:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --include=optional
      - run: npx playwright install --with-deps chromium
      - name: Start dev server
        run: npm run dev -w packages/web &
        timeout-minutes: 1
      - name: Wait for dev server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:5173 > /dev/null && break
            sleep 2
          done
      - run: npx playwright test
        env:
          APP_URL: http://localhost:5173
      - name: Stop dev server
        if: always()
        run: kill $(lsof -t -i:5173) 2>/dev/null || true

  build-web:
    name: Build Web
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --include=optional
      - run: npm run build -w packages/web
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist
          retention-days: 1

  build-electron:
    name: Build Electron
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --include=optional
      - run: npm run build -w packages/electron

  deploy-web:
    name: Deploy Web to Cloudflare Pages
    needs: build-web
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy packages/web/dist --project-name=imposition
