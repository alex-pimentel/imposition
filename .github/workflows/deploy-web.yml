name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/ui/**'
      - 'packages/core/**'
      - 'package.json'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/web
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy packages/web/dist --project-name=imposition
